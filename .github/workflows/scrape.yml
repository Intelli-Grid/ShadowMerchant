name: Scrape Deals (Cron)

on:
  schedule:
    # Run every 6 hours: 12am, 6am, 12pm, 6pm IST (UTC+5:30)
    - cron: '30 18 * * *'   # 12:00 AM IST
    - cron: '30 0 * * *'    # 06:00 AM IST
    - cron: '30 6 * * *'    # 12:00 PM IST
    - cron: '30 12 * * *'   # 06:00 PM IST
  workflow_dispatch:
    inputs:
      scrapers:
        description: 'Scrapers to run (space-separated: amazon flipkart myntra)'
        required: false
        default: 'amazon flipkart myntra'
      run_trends:
        description: 'Run trend analyzer first?'
        required: false
        default: 'true'

jobs:
  analyze-trends:
    name: Trend Analysis
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_trends != 'false' }}
    outputs:
      targets: ${{ steps.analyze.outputs.targets }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt pytrends

      - name: Run trend analyzer
        id: analyze
        env:
          MONGO_URI:    ${{ secrets.MONGO_URI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd scripts
          python analyzers/trend_analyzer.py
          echo "targets=$(cat scraper_targets.json | tr -d '\n')" >> $GITHUB_OUTPUT

      - name: Upload targets artifact
        uses: actions/upload-artifact@v4
        with:
          name: scraper-targets
          path: scripts/scraper_targets.json
          retention-days: 1

  scrape:
    name: Run Scrapers
    runs-on: ubuntu-latest
    needs: [analyze-trends]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright + browsers
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Download trend targets (if available)
        uses: actions/download-artifact@v4
        with:
          name: scraper-targets
          path: scripts/
        continue-on-error: true

      - name: Run pipeline
        env:
          MONGO_URI:               ${{ secrets.MONGO_URI }}
          AMAZON_AFFILIATE_TAG:    ${{ secrets.AMAZON_AFFILIATE_TAG }}
          FLIPKART_AFFILIATE_ID:   ${{ secrets.FLIPKART_AFFILIATE_ID }}
          CLOUDINARY_CLOUD_NAME:   ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:      ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:   ${{ secrets.CLOUDINARY_API_SECRET }}
          ALGOLIA_APP_ID:          ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY:       ${{ secrets.ALGOLIA_ADMIN_KEY }}
          ALGOLIA_INDEX_NAME:      ${{ secrets.ALGOLIA_INDEX_NAME }}
        run: |
          cd scripts
          SCRAPERS="${{ github.event.inputs.scrapers }}"
          if [ -z "$SCRAPERS" ]; then
            python run_pipeline.py
          else
            python run_pipeline.py --scrapers $SCRAPERS
          fi

  index-algolia:
    name: Sync Algolia Index
    runs-on: ubuntu-latest
    needs: [scrape]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sync Algolia
        env:
          MONGO_URI:         ${{ secrets.MONGO_URI }}
          ALGOLIA_APP_ID:    ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
          ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
        run: |
          cd scripts
          python index_algolia.py
