name: ShadowMerchant Scraper Pipeline

on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      run_amazon:
        description: 'Run Amazon scraper'
        type: boolean
        default: true
      run_meesho:
        description: 'Run Meesho scraper'
        type: boolean
        default: true
      run_myntra:
        description: 'Run Myntra scraper'
        type: boolean
        default: true
      run_nykaa:
        description: 'Run Nykaa scraper'
        type: boolean
        default: true
      run_flipkart:
        description: 'Run Flipkart (needs FLIPKART_AFFILIATE_ID secret)'
        type: boolean
        default: false

# Jobs are chained one-at-a-time via needs to avoid shared-IP collisions.
# Each job has its own Python + dependency setup so it can run independently.
#
# ScraperAPI credit budget (5000/month free tier)
#   meesho  12 categories x 2 pages = 24 per run
#   myntra  15 queries x 1 page     = 15 per run
#   nykaa   10 queries x 1 page     = 10 per run
#   total   49 per run x 2 per day x 30 days = 2940/month

jobs:

  scrape-amazon:
    name: Amazon Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: ${{ github.event_name == 'schedule' || github.event.inputs.run_amazon == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt
      - name: Install deps
        run: pip install -r scripts/requirements.txt --quiet
      - name: Install Playwright browser
        run: python -m playwright install chromium
      - name: Install Playwright system dependencies
        run: python -m playwright install-deps chromium
      - name: Run scraper
        env:
          MONGODB_URI:            ${{ secrets.MONGODB_URI }}
          AMAZON_AFFILIATE_TAG:   ${{ secrets.AMAZON_AFFILIATE_TAG }}
          ALGOLIA_APP_ID:         ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY:      ${{ secrets.ALGOLIA_ADMIN_KEY }}
          ALGOLIA_INDEX_NAME:     ${{ secrets.ALGOLIA_INDEX_NAME }}
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          TELEGRAM_CHANNEL_ID:    ${{ secrets.TELEGRAM_CHANNEL_ID }}
          PYTHONIOENCODING:       utf-8
        run: |
          cd scripts
          python scheduler.py --run-now --scrapers amazon
      - name: Alert on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=[Amazon] Scraper FAILED - check GitHub Actions." || true

  scrape-meesho:
    name: Meesho Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: scrape-amazon
    if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.run_meesho == 'true') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt
      - name: Install deps
        run: pip install -r scripts/requirements.txt --quiet
      - name: Run scraper
        env:
          MONGODB_URI:            ${{ secrets.MONGODB_URI }}
          SCRAPERAPI_KEY:         ${{ secrets.SCRAPERAPI_KEY }}
          MEESHO_AFFILIATE_TAG:   ${{ secrets.MEESHO_AFFILIATE_TAG }}
          ALGOLIA_APP_ID:         ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY:      ${{ secrets.ALGOLIA_ADMIN_KEY }}
          ALGOLIA_INDEX_NAME:     ${{ secrets.ALGOLIA_INDEX_NAME }}
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          TELEGRAM_CHANNEL_ID:    ${{ secrets.TELEGRAM_CHANNEL_ID }}
          PYTHONIOENCODING:       utf-8
        run: |
          cd scripts
          python scheduler.py --run-now --scrapers meesho
      - name: Alert on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=[Meesho] Scraper FAILED - check GitHub Actions." || true

  scrape-myntra:
    name: Myntra Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: scrape-meesho
    if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.run_myntra == 'true') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt
      - name: Install deps
        run: pip install -r scripts/requirements.txt --quiet
      - name: Run scraper
        env:
          MONGODB_URI:            ${{ secrets.MONGODB_URI }}
          SCRAPERAPI_KEY:         ${{ secrets.SCRAPERAPI_KEY }}
          MYNTRA_AFFILIATE_TAG:   ${{ secrets.MYNTRA_AFFILIATE_TAG }}
          ALGOLIA_APP_ID:         ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY:      ${{ secrets.ALGOLIA_ADMIN_KEY }}
          ALGOLIA_INDEX_NAME:     ${{ secrets.ALGOLIA_INDEX_NAME }}
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          TELEGRAM_CHANNEL_ID:    ${{ secrets.TELEGRAM_CHANNEL_ID }}
          PYTHONIOENCODING:       utf-8
        run: |
          cd scripts
          python scheduler.py --run-now --scrapers myntra
      - name: Alert on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=[Myntra] Scraper FAILED - check GitHub Actions." || true

  scrape-nykaa:
    name: Nykaa Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: scrape-myntra
    if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.run_nykaa == 'true') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt
      - name: Install deps
        run: pip install -r scripts/requirements.txt --quiet
      - name: Run scraper
        env:
          MONGODB_URI:            ${{ secrets.MONGODB_URI }}
          SCRAPERAPI_KEY:         ${{ secrets.SCRAPERAPI_KEY }}
          NYKAA_AFFILIATE_TAG:    ${{ secrets.NYKAA_AFFILIATE_TAG }}
          ALGOLIA_APP_ID:         ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY:      ${{ secrets.ALGOLIA_ADMIN_KEY }}
          ALGOLIA_INDEX_NAME:     ${{ secrets.ALGOLIA_INDEX_NAME }}
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          TELEGRAM_CHANNEL_ID:    ${{ secrets.TELEGRAM_CHANNEL_ID }}
          PYTHONIOENCODING:       utf-8
        run: |
          cd scripts
          python scheduler.py --run-now --scrapers nykaa
      - name: Alert on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=[Nykaa] Scraper FAILED - check GitHub Actions." || true

  scrape-flipkart:
    name: Flipkart Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: scrape-nykaa
    if: ${{ always() && github.event.inputs.run_flipkart == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt
      - name: Install deps
        run: pip install -r scripts/requirements.txt --quiet
      - name: Run scraper
        env:
          MONGODB_URI:              ${{ secrets.MONGODB_URI }}
          FLIPKART_AFFILIATE_ID:    ${{ secrets.FLIPKART_AFFILIATE_ID }}
          FLIPKART_AFFILIATE_TOKEN: ${{ secrets.FLIPKART_AFFILIATE_TOKEN }}
          ALGOLIA_APP_ID:           ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY:        ${{ secrets.ALGOLIA_ADMIN_KEY }}
          ALGOLIA_INDEX_NAME:       ${{ secrets.ALGOLIA_INDEX_NAME }}
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID:   ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          TELEGRAM_CHANNEL_ID:      ${{ secrets.TELEGRAM_CHANNEL_ID }}
          PYTHONIOENCODING:         utf-8
        run: |
          cd scripts
          python scheduler.py --run-now --scrapers flipkart
      - name: Alert on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=[Flipkart] Scraper FAILED - check GitHub Actions." || true

  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [scrape-amazon, scrape-meesho, scrape-myntra, scrape-nykaa, scrape-flipkart]
    if: always()
    steps:
      - name: Post summary to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          R_AMAZON:   ${{ needs.scrape-amazon.result }}
          R_MEESHO:   ${{ needs.scrape-meesho.result }}
          R_MYNTRA:   ${{ needs.scrape-myntra.result }}
          R_NYKAA:    ${{ needs.scrape-nykaa.result }}
          R_FLIPKART: ${{ needs.scrape-flipkart.result }}
        run: |
          icon() { [ "$1" = "success" ] && echo "OK" || ([ "$1" = "skipped" ] && echo "SKIP" || echo "FAIL"); }
          MSG="ShadowMerchant Pipeline Done
          Amazon   $(icon $R_AMAZON)
          Meesho   $(icon $R_MEESHO)
          Myntra   $(icon $R_MYNTRA)
          Nykaa    $(icon $R_NYKAA)
          Flipkart $(icon $R_FLIPKART)"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MSG}" || true
