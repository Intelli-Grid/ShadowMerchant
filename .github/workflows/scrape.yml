name: ShadowMerchant — Scraper Pipeline

on:
  schedule:
    # Run 2x daily: 6:30 AM IST and 8:30 PM IST
    - cron: '0 1 * * *'    # 06:30 AM IST
    - cron: '0 15 * * *'   # 08:30 PM IST
  workflow_dispatch:
    inputs:
      run_amazon:
        description: 'Run Amazon scraper'
        type: boolean
        default: true
      run_meesho:
        description: 'Run Meesho scraper'
        type: boolean
        default: true
      run_myntra:
        description: 'Run Myntra scraper'
        type: boolean
        default: true

# ─────────────────────────────────────────────────────────────
# JOB 1: Amazon — uses Playwright for full browser automation
# ─────────────────────────────────────────────────────────────
jobs:
  scrape-amazon:
    name: 🛒 Amazon Scraper
    runs-on: self-hosted
    timeout-minutes: 30
    if: ${{ github.event_name == 'schedule' || github.event.inputs.run_amazon == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        shell: powershell
        run: pip install -r scripts/requirements.txt --quiet --no-warn-script-location

      - name: Install Playwright Chromium
        shell: powershell
        run: python -m playwright install chromium

      - name: Run Amazon scraper
        shell: powershell
        env:
          MONGODB_URI:           ${{ secrets.MONGODB_URI }}
          AMAZON_AFFILIATE_TAG:  ${{ secrets.AMAZON_AFFILIATE_TAG }}
          ALGOLIA_APP_ID:        ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY:     ${{ secrets.ALGOLIA_ADMIN_KEY }}
          ALGOLIA_INDEX_NAME:    ${{ secrets.ALGOLIA_INDEX_NAME }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          PYTHONIOENCODING:      utf-8
        run: |
          Set-Location scripts
          python scheduler.py --run-now --scrapers amazon

      - name: Notify on failure
        if: failure()
        shell: powershell
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          $body = @{ chat_id = $env:TELEGRAM_ADMIN_CHAT_ID; text = "⚠️ Amazon scraper FAILED on GitHub Actions. Check run logs." } | ConvertTo-Json
          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendMessage" -Method POST -Body $body -ContentType "application/json" -ErrorAction SilentlyContinue

# ─────────────────────────────────────────────────────────────
# JOB 2: Meesho — uses curl_cffi with residential IP (self-hosted runner)
# ─────────────────────────────────────────────────────────────
  scrape-meesho:
    name: 🛍️ Meesho Scraper
    runs-on: self-hosted
    timeout-minutes: 20
    needs: scrape-amazon   # Run after Amazon to avoid IP saturation
    if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.run_meesho == 'true') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        shell: powershell
        run: pip install -r scripts/requirements.txt --quiet --no-warn-script-location

      - name: Run Meesho scraper
        shell: powershell
        env:
          MONGODB_URI:           ${{ secrets.MONGODB_URI }}
          SCRAPERAPI_KEY:        ${{ secrets.SCRAPERAPI_KEY }}
          MEESHO_AFFILIATE_TAG:  ${{ secrets.MEESHO_AFFILIATE_TAG }}
          ALGOLIA_APP_ID:        ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY:     ${{ secrets.ALGOLIA_ADMIN_KEY }}
          ALGOLIA_INDEX_NAME:    ${{ secrets.ALGOLIA_INDEX_NAME }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          PYTHONIOENCODING:      utf-8
        run: |
          Set-Location scripts
          python scheduler.py --run-now --scrapers meesho

      - name: Notify on failure
        if: failure()
        shell: powershell
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          $body = @{ chat_id = $env:TELEGRAM_ADMIN_CHAT_ID; text = "⚠️ Meesho scraper FAILED on GitHub Actions. Check run logs." } | ConvertTo-Json
          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendMessage" -Method POST -Body $body -ContentType "application/json" -ErrorAction SilentlyContinue

# ─────────────────────────────────────────────────────────────
# JOB 3: Myntra — uses curl_cffi HTML state extraction (no Playwright needed)
# ─────────────────────────────────────────────────────────────
  scrape-myntra:
    name: 👗 Myntra Scraper
    runs-on: self-hosted
    timeout-minutes: 25
    needs: scrape-meesho   # Run sequentially to avoid concurrent IP usage
    if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.run_myntra == 'true') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        shell: powershell
        run: pip install -r scripts/requirements.txt --quiet --no-warn-script-location

      - name: Run Myntra scraper
        shell: powershell
        env:
          MONGODB_URI:           ${{ secrets.MONGODB_URI }}
          MYNTRA_AFFILIATE_TAG:  ${{ secrets.MYNTRA_AFFILIATE_TAG }}
          ALGOLIA_APP_ID:        ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY:     ${{ secrets.ALGOLIA_ADMIN_KEY }}
          ALGOLIA_INDEX_NAME:    ${{ secrets.ALGOLIA_INDEX_NAME }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          PYTHONIOENCODING:      utf-8
        run: |
          Set-Location scripts
          python scheduler.py --run-now --scrapers myntra

      - name: Notify on failure
        if: failure()
        shell: powershell
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          $body = @{ chat_id = $env:TELEGRAM_ADMIN_CHAT_ID; text = "⚠️ Myntra scraper FAILED on GitHub Actions. Check run logs." } | ConvertTo-Json
          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendMessage" -Method POST -Body $body -ContentType "application/json" -ErrorAction SilentlyContinue

# ─────────────────────────────────────────────────────────────
# JOB 4: Final summary — report pipeline status to Telegram
# ─────────────────────────────────────────────────────────────
  pipeline-summary:
    name: 📊 Pipeline Summary
    runs-on: self-hosted
    needs: [scrape-amazon, scrape-meesho, scrape-myntra]
    if: always()

    steps:
      - name: Send pipeline summary to Telegram
        shell: powershell
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          $amazon  = "${{ needs.scrape-amazon.result }}"
          $meesho  = "${{ needs.scrape-meesho.result }}"
          $myntra  = "${{ needs.scrape-myntra.result }}"

          function emoji($r) { if ($r -eq "success") { return "✅" } elseif ($r -eq "skipped") { return "⏭️" } else { return "❌" } }

          $msg = "📊 ShadowMerchant Scraper Run Complete`n" +
                 "Amazon:  $(emoji $amazon)  $amazon`n" +
                 "Meesho:  $(emoji $meesho)  $meesho`n" +
                 "Myntra:  $(emoji $myntra)  $myntra`n" +
                 "Triggered: ${{ github.event_name }}"

          $body = @{ chat_id = $env:TELEGRAM_ADMIN_CHAT_ID; text = $msg } | ConvertTo-Json
          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendMessage" -Method POST -Body $body -ContentType "application/json" -ErrorAction SilentlyContinue
