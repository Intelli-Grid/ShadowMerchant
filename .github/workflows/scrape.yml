name: ShadowMerchant — Deal Scraper

on:
  schedule:
    # 4x/day (UTC) — 6am, 12pm, 6pm, 12am IST
    - cron: '30 0 * * *'    # 06:00 AM IST
    - cron: '30 6 * * *'    # 12:00 PM IST
    - cron: '30 12 * * *'   # 06:00 PM IST
    - cron: '30 18 * * *'   # 12:00 AM IST
  workflow_dispatch:
    inputs:
      scrapers:
        description: 'Scrapers to run (space-separated, e.g. "meesho amazon flipkart")'
        required: false
        default: 'meesho amazon flipkart myntra nykaa'

jobs:
  scrape:
    name: Run Scrapers
    runs-on: self-hosted       # Uses your Windows machine (residential IP)
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install/update Python dependencies
        shell: powershell
        run: pip install -r scripts/requirements.txt --quiet --no-warn-script-location

      - name: Ensure Playwright Firefox is installed
        shell: powershell
        run: python -m playwright install firefox

      - name: Run pipeline
        shell: powershell
        env:
          MONGODB_URI:           ${{ secrets.MONGODB_URI || secrets.MONGO_URI }}
          AMAZON_AFFILIATE_TAG:  ${{ secrets.AMAZON_AFFILIATE_TAG }}
          MEESHO_AFFILIATE_TAG:  ${{ secrets.MEESHO_AFFILIATE_TAG }}
          ALGOLIA_APP_ID:        ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY:     ${{ secrets.ALGOLIA_ADMIN_KEY }}
          ALGOLIA_INDEX_NAME:    ${{ secrets.ALGOLIA_INDEX_NAME }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID:   "@ShadowMerchantDeals"
          PYTHONIOENCODING:      utf-8
        run: |
          Set-Location scripts
          $scrapers = "${{ github.event.inputs.scrapers }}"
          if ([string]::IsNullOrEmpty($scrapers.Trim())) {
            $scrapers = "meesho amazon flipkart myntra"
          }
          $scraperArgs = $scrapers -split '\s+'
          python scheduler.py --run-now --scrapers $scraperArgs

      - name: Show pipeline log
        if: always()
        shell: powershell
        run: |
          if (Test-Path "scripts/scheduler.log") {
            Write-Host "=== Last 80 lines of scheduler.log ==="
            Get-Content "scripts/scheduler.log" -Tail 80
          } else {
            Write-Host "No scheduler.log found"
          }
