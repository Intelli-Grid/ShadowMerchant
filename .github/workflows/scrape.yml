name: ShadowMerchant — Scraper Pipeline

on:
  schedule:
    # Run 2x daily: 6:30 AM IST and 8:30 PM IST
    - cron: '0 1 * * *'    # 06:30 AM IST
    - cron: '0 15 * * *'   # 08:30 PM IST
  workflow_dispatch:
    inputs:
      run_amazon:
        description: 'Run Amazon scraper'
        type: boolean
        default: true
      run_meesho:
        description: 'Run Meesho scraper'
        type: boolean
        default: true
      run_myntra:
        description: 'Run Myntra scraper'
        type: boolean
        default: true

# CRIT-07 fix: Migrated from self-hosted (Windows) to ubuntu-latest (GitHub-hosted).
# Self-hosted runner required a PC to be always on — jobs silently queued forever
# when the runner was offline. GitHub-hosted runners are always available.
# All shell commands rewritten from PowerShell to bash.

# ─────────────────────────────────────────────────────────────
# JOB 1: Amazon — uses Playwright for full browser automation
# ─────────────────────────────────────────────────────────────
jobs:
  scrape-amazon:
    name: 🛒 Amazon Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'schedule' || github.event.inputs.run_amazon == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt --quiet

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Run Amazon scraper
        env:
          MONGODB_URI:            ${{ secrets.MONGODB_URI }}
          AMAZON_AFFILIATE_TAG:   ${{ secrets.AMAZON_AFFILIATE_TAG }}
          ALGOLIA_APP_ID:         ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY:      ${{ secrets.ALGOLIA_ADMIN_KEY }}
          ALGOLIA_INDEX_NAME:     ${{ secrets.ALGOLIA_INDEX_NAME }}
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          PYTHONIOENCODING:       utf-8
        run: |
          cd scripts
          python scheduler.py --run-now --scrapers amazon

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_ADMIN_CHAT_ID}\",\"text\":\"⚠️ Amazon scraper FAILED on GitHub Actions. Check run logs.\"}" || true

# ─────────────────────────────────────────────────────────────
# JOB 2: Meesho — uses httpx JSON API (no browser needed)
# ─────────────────────────────────────────────────────────────
  scrape-meesho:
    name: 🛍️ Meesho Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: scrape-amazon   # Run after Amazon to avoid IP saturation
    if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.run_meesho == 'true') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt --quiet

      - name: Run Meesho scraper
        env:
          MONGODB_URI:            ${{ secrets.MONGODB_URI }}
          SCRAPERAPI_KEY:         ${{ secrets.SCRAPERAPI_KEY }}
          MEESHO_AFFILIATE_TAG:   ${{ secrets.MEESHO_AFFILIATE_TAG }}
          ALGOLIA_APP_ID:         ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY:      ${{ secrets.ALGOLIA_ADMIN_KEY }}
          ALGOLIA_INDEX_NAME:     ${{ secrets.ALGOLIA_INDEX_NAME }}
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          PYTHONIOENCODING:       utf-8
        run: |
          cd scripts
          python scheduler.py --run-now --scrapers meesho

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_ADMIN_CHAT_ID}\",\"text\":\"⚠️ Meesho scraper FAILED on GitHub Actions. Check run logs.\"}" || true

# ─────────────────────────────────────────────────────────────
# JOB 3: Myntra — uses curl_cffi Chrome TLS (no browser needed)
# ─────────────────────────────────────────────────────────────
  scrape-myntra:
    name: 👗 Myntra Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: scrape-meesho   # Run sequentially to avoid concurrent IP usage
    if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.run_myntra == 'true') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt --quiet

      - name: Run Myntra scraper
        env:
          MONGODB_URI:            ${{ secrets.MONGODB_URI }}
          MYNTRA_AFFILIATE_TAG:   ${{ secrets.MYNTRA_AFFILIATE_TAG }}
          ALGOLIA_APP_ID:         ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY:      ${{ secrets.ALGOLIA_ADMIN_KEY }}
          ALGOLIA_INDEX_NAME:     ${{ secrets.ALGOLIA_INDEX_NAME }}
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          PYTHONIOENCODING:       utf-8
        run: |
          cd scripts
          python scheduler.py --run-now --scrapers myntra

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_ADMIN_CHAT_ID}\",\"text\":\"⚠️ Myntra scraper FAILED on GitHub Actions. Check run logs.\"}" || true

# ─────────────────────────────────────────────────────────────
# JOB 4: Final summary — report pipeline status to Telegram
# ─────────────────────────────────────────────────────────────
  pipeline-summary:
    name: 📊 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [scrape-amazon, scrape-meesho, scrape-myntra]
    if: always()

    steps:
      - name: Send pipeline summary to Telegram
        env:
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          AMAZON="${{ needs.scrape-amazon.result }}"
          MEESHO="${{ needs.scrape-meesho.result }}"
          MYNTRA="${{ needs.scrape-myntra.result }}"

          emoji() {
            case "$1" in
              success) echo "✅" ;;
              skipped) echo "⏭️" ;;
              *)        echo "❌" ;;
            esac
          }

          MSG="📊 ShadowMerchant Scraper Run Complete
Amazon:  $(emoji $AMAZON)  $AMAZON
Meesho:  $(emoji $MEESHO)  $MEESHO
Myntra:  $(emoji $MYNTRA)  $MYNTRA
Triggered: ${{ github.event_name }}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_ADMIN_CHAT_ID}\",\"text\":$(echo "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}" || true
